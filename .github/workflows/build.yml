name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Strip any accidental whitespace/newlines from the secrets before
          # using them — this is what causes "malformed HTTP Authorization
          # header" even when the secret looks correct in the GitHub UI.
          CLEAN_USER=$(printf '%s' "$DH_USER" | tr -d '[:space:]')
          CLEAN_TOKEN=$(printf '%s' "$DH_TOKEN" | tr -d '[:space:]')
          echo "$CLEAN_TOKEN" | docker login -u "$CLEAN_USER" --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/track1-agent:latest
